<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estação da Páscoa</title>
    <link rel="stylesheet" href="pascoa.css">
</head>
<body>

    <header>
        <h1>Estação da Páscoa</h1>
        <div class="sub-header">
            <h4>Cardápio de páscoa 2026!</h4>
            <h5>Por Joana Nonemacher</h5>
        </div>
    </header>

    <main>
        <div class="topo-main">
            <button class="btn-carrinho">🛒</button>
        </div>

        <section class="vitrine">
            
            <div class="card-produto">
                <div class="moldura-foto">
                    <img src="imagens/branquinho com coco.jpg" alt="">
                </div>
                <p class="nome-produto">Branquinho com coco 200g</p>
                <p class="preco-produto">R$ 80,00</p>
            </div>

            <div class="card-produto">
                <div class="moldura-foto">
                    <img src="imagens/brigadeiro.jpg" alt="">
                </div>
                <p class="nome-produto">Brigadeiro tradicional 200g</p>
                <p class="preco-produto">R$ 80,00</p>
            </div>

            <div class="card-produto">
                <div class="moldura-foto">
                    <img src="imagens/duo.jpg" alt="">
                </div>
                <p class="nome-produto">Duo 200g</p>
                <p class="preco-produto">R$ 80,00</p>
            </div>

            <div class="card-produto">
                <div class="moldura-foto">
                    <img src="imagens/ferrero.jpg" alt="">
                </div>
                <p class="nome-produto">Ferrero Rocher 200g</p>
                <p class="preco-produto">R$ 100,00</p>
            </div>

            </section>
    </main>

    <footer>
        <img src="https://via.placeholder.com/80x40" alt="Logo" class="logo-footer">
        <div class="info-contato">
            <p>Instagram: @suaempresa</p>
            <p>WhatsApp: (00) 00000-0000</p>
        </div>
    </footer>

</body>
</html>
